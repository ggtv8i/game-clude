# ╔══════════════════════════════════════════════════════╗
# ║      ARCADE VAULT — Nginx Server Configuration      ║
# ╚══════════════════════════════════════════════════════╝
# استخدم هذا الملف كإعداد لـ Nginx على خادم حقيقي
# ضعه في: /etc/nginx/sites-available/arcade-vault
# ثم نفّذ: ln -s /etc/nginx/sites-available/arcade-vault /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;

    # غيّر هذا إلى نطاقك أو IP الخادم
    server_name localhost your-domain.com;

    # مجلد الموقع — غيّره حسب مكان رفع الملفات
    root /var/www/arcade-vault;
    index index.html;

    # ── أنواع ملفات ROM ──
    types {
        application/octet-stream   nes smc sfc gba gb gbc nds;
        application/octet-stream   md gen smd sms gg 32x;
        application/octet-stream   n64 z64 v64 bin iso chd gdi cdi;
        application/octet-stream   a26 a78 pce ngp ngpc ws wsc vb lnx;
        application/octet-stream   pbp cso;
        application/wasm           wasm;
    }

    # ── CORS لجميع الطلبات ──
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Range" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

    # ── OPTIONS preflight ──
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── الملف الرئيسي ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── مجلد ROM (تحميل مباشر) ──
    location /roms/ {
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=604800";
    }

    # ── ضغط ──
    gzip on;
    gzip_types text/html application/javascript text/css application/json;

    # ── Cache ──
    location ~* \.(nes|smc|gba|gb|md|n64|bin)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ── حجم الرفع (للملفات الكبيرة) ──
    client_max_body_size 2G;
}
